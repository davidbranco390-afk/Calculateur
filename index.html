<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculatrice · Futuriste</title>
  <!-- Google Font pour une typographie élégante -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <!-- Feuille de styles principale -->
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <div class="container">
    <!-- Calculatrice avec effet glassmorphism + animations -->
    <div class="calculator glass">
      <!-- Écran : affichage dynamique -->
      <div class="display">
        <div class="expression" id="expression"></div>
        <div class="result" id="result">0</div>
      </div>
      <!-- Pavé numérique -->
      <div class="buttons">
        <!-- Ligne 1 -->
        <button class="btn operator" data-value="C">C</button>
        <button class="btn operator" data-value="⌫">⌫</button>
        <button class="btn operator" data-value="÷">÷</button>
        <button class="btn operator" data-value="×">×</button>
        <!-- Ligne 2 -->
        <button class="btn number" data-value="7">7</button>
        <button class="btn number" data-value="8">8</button>
        <button class="btn number" data-value="9">9</button>
        <button class="btn operator" data-value="−">−</button>
        <!-- Ligne 3 -->
        <button class="btn number" data-value="4">4</button>
        <button class="btn number" data-value="5">5</button>
        <button class="btn number" data-value="6">6</button>
        <button class="btn operator" data-value="+">+</button>
        <!-- Ligne 4 -->
        <button class="btn number" data-value="1">1</button>
        <button class="btn number" data-value="2">2</button>
        <button class="btn number" data-value="3">3</button>
        <button class="btn equals" data-value="=">=</button>
        <!-- Ligne 5 -->
        <button class="btn number zero" data-value="0">0</button>
        <button class="btn number" data-value=".">.</button>
        <button class="btn equals" data-value="=" style="grid-column: span 2;">=</button>
      </div>
    </div>
  </div>
  <!-- Script principal -->
  <script src="index.js"></script>
</body>
</html>
